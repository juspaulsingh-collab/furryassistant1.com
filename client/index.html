    <!-- Structured Data: FAQPage (matches the FAQ on the landing page — eligible for rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is it really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — 100% free, forever. Every feature is included for everyone, including AI nutrition plans, AI pet chat, GPS tracking, unlimited pets, and more. No credit card required."
          }
        },
        {
          "@type": "Question",
          "name": "What's the catch?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No catch. We don't sell your data, we don't show ads, and we don't have a paid tier waiting to upsell you. If you love the app, the best way to support us is to tell a friend."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to download from the App Store?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No download required. Furry Assistant 1 works in any modern browser, and you can install it directly from this website to your phone's home screen — it'll behave just like a native app."
          }
        },
        {
          "@type": "Question",
          "name": "Is my pet's data private?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Your data is encrypted, stored securely, and never sold. Only you can see your pet's records, unless you explicitly share them with someone via QR code."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use it for multiple pets?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely — add as many pets as you'd like. There's no limit on the free plan, which is the only plan. Perfect for households with several furry friends."
          }
        },
        {
          "@type": "Question",
          "name": "Will you start charging later?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our intention is to keep the core app free for individual pet parents. If we ever add optional paid extras (like advanced veterinary integrations for clinics), the features available today will remain free."
          }
        },
        {
          "@type": "Question",
          "name": "Is the AI a replacement for a veterinarian?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. The AI features in Furry Assistant 1 provide general pet care information and suggestions to help you stay organized, but they are not veterinary medical advice, diagnosis, or treatment. Always consult a licensed veterinarian for any health concerns, emergencies, or before making changes to your pet's diet or medications."
          }
        },
        {
          "@type": "Question",
          "name": "How does the app stay free? Are there ads?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The app is supported by unobtrusive advertising (via Google AdSense), which is what allows every feature to remain 100% free for every user. Ads are personalized only if you accept cookies in the consent banner — otherwise you'll still see ads, but they'll be based on the page content, not your browsing history. We never sell your pet's data and never share your account contents with advertisers."
          }
        }
      ]
    }
    </script>
